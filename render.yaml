services:
  - type: web
    name: movi-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: UPLOAD_DIR
        value: /opt/render/project/src/apps/backend/uploads
